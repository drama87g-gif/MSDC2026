services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    command: bash -c "python manage.py migrate --noinput && gunicorn msdc_backend.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    depends_on:
      db: db
      condition: service_healthy
    ports:
      - "8000:8000"
     
    volumes:
      - ./backend/app
    
  frontend:
    build: ./frontend
    env_file: .env
    volumes:
      - ./frontend:/usr/src/app
    ports:
      - "3000:3000"
    depends_on:
      - backend  
      
volumes:
  db_data:
  media_data: