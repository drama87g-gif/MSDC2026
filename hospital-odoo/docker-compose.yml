version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    container_name: hospital-odoo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: postgres
      PORT: 5432
      USER: odoo
      PASSWORD: odoo_secure_password
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: >
      odoo
      --db_user=odoo
      --db_password=odoo_secure_password
      --db_host=postgres
      --db_port=5432
      --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      --dev=reload

volumes:
  postgres_data:
  odoo_data:
