version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: msdc
      POSTGRES_PASSWORD: msdcpass
      POSTGRES_DB: msdc
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: gunicorn -b 0.0.0.0:5000 -w 4 app:app
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://msdc:msdcpass@db:5432/msdc
      - UPLOAD_FOLDER=/app/uploads
      - INIT_DB=1
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis

  frontend:
    image: node:18
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"

volumes:
  db-data:
  uploads:
