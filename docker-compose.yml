services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: msdc-backend
    environment:
      DATABASE_URL: sqlite:///msdc.db
      FLASK_ENV: production
    ports:
      - "5000:5000"
    networks:
      - msdc

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: msdc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - msdc

networks:
  msdc:
    driver: bridge
