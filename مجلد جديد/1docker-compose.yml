services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msdc.db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    command: bash -c "python manage.py migrate --noinput && gunicorn msdc_backend.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    env_file: .env
    volumes:
      - ./frontend:/usr/src/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  media_data: